name: Public Release Hygiene

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  GITLEAKS_VERSION: 8.24.3
  TRUFFLEHOG_VERSION: 3.88.18

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web-gui/package-lock.json

      - name: Install secret scanners
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            x86_64) gitleaks_arch=x64; trufflehog_arch=amd64 ;;
            aarch64|arm64) gitleaks_arch=arm64; trufflehog_arch=arm64 ;;
            *) echo "unsupported architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          scanner_dir="$(mktemp -d)"
          cd "$scanner_dir"

          gitleaks_asset="gitleaks_${GITLEAKS_VERSION}_linux_${gitleaks_arch}.tar.gz"
          curl -fsSLO "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${gitleaks_asset}"
          curl -fsSLO "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          grep "  ${gitleaks_asset}$" "gitleaks_${GITLEAKS_VERSION}_checksums.txt" | sha256sum -c -
          tar -xzf "$gitleaks_asset" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

          trufflehog_asset="trufflehog_${TRUFFLEHOG_VERSION}_linux_${trufflehog_arch}.tar.gz"
          curl -fsSLO "https://github.com/trufflesecurity/trufflehog/releases/download/v${TRUFFLEHOG_VERSION}/${trufflehog_asset}"
          curl -fsSLO "https://github.com/trufflesecurity/trufflehog/releases/download/v${TRUFFLEHOG_VERSION}/trufflehog_${TRUFFLEHOG_VERSION}_checksums.txt"
          grep "  ${trufflehog_asset}$" "trufflehog_${TRUFFLEHOG_VERSION}_checksums.txt" | sha256sum -c -
          tar -xzf "$trufflehog_asset" trufflehog
          sudo install -m 0755 trufflehog /usr/local/bin/trufflehog

          gitleaks version
          trufflehog --version

      - name: Validate shell scripts and repository hygiene
        run: scripts/validate.sh

      - name: Scan git history with gitleaks
        run: gitleaks detect --redact --source .

      - name: Scan git history with trufflehog
        run: trufflehog git file://$PWD --fail --only-verified --no-update

      - name: Compile Python source
        run: PYTHONDONTWRITEBYTECODE=1 find api/app packages/FilePromptForge -type f -name '*.py' -print0 | xargs -0 python -m py_compile

      - name: Install API dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e ./api

      - name: Install web GUI dependencies
        working-directory: web-gui
        run: npm ci

      - name: Audit web GUI dependencies
        working-directory: web-gui
        run: npm audit --audit-level=high

      - name: Smoke test install
        run: scripts/smoke.sh
