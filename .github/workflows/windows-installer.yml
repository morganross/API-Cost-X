name: Windows Installer

on:
  workflow_dispatch:
  pull_request:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web-gui/package-lock.json

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ($version -match '^v(.+)$') {
            $version = $Matches[1]
          }
          if (-not $version -or $version -eq '${{ github.ref_name }}') {
            $version = "0.0.0-ci.${{ github.run_number }}"
          }
          .\scripts\build-windows.ps1 -Version $version

      - name: Upload installer artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: windows-installer
          path: |
            dist/installer/*.exe
            dist/installer/SHA256SUMS-windows.txt
          retention-days: 14
